{% extends 'shopapp/base.html' %}

{% block title %}
Confirm delete {{ object.id }}
{% endblock %}

{% block body %}
<h1>Are you sure you want to delete order {{ object.id }}?</h1>
<br>
<div>
    <a href="{% url 'shopapp:orders_list' %}">
        Back to order
    </a>
</div>
<br>
<div>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Delete</button>
    </form>
</div>
{% endblock %}
